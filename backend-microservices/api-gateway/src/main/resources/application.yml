server:
  port: 8089   # giu port cua backend cu de frontend Angular khong phai sua gi

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # Gop header CORS bi trung (gateway + service con deu them) -> tranh loi net::ERR_FAILED tren trinh duyet
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Access-Control-Expose-Headers, RETAIN_UNIQUE
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
            allowedHeaders: [authorization, content-type, x-auth-token, x-skip-auth]
            exposedHeaders: [x-auth-token]
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/users/**,/api/v1/roles/**,/api/v1/healthcheck/**
        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/products/**,/api/v1/categories/**,/api/v1/variants/**,/api/v1/reviews/**
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/orders/**,/api/v1/order_details/**,/api/v1/coupons/**,/api/v1/revenues/**
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/payments/**
        - id: chatbot-service
          uri: ${CHATBOT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/chatbot/**,/api/v1/test/**
