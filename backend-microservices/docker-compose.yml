# Ha tang cho he thong microservices.
# Cac service Spring Boot chay ngoai docker (java -jar / mvn) va tro vao day.
#
# Luu y cong: Kafka dung 9094, Redis dung 6380 (khac mac dinh 9092/6379)
# de tranh dung voi project khac dang chiem cong tren may nay.
services:
  postgres:
    image: postgres:16-alpine
    container_name: ecom-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    ports:
      - "6380:6379"   # host 6380 -> container 6379

  kafka:
    image: apache/kafka:3.8.1
    container_name: ecom-kafka
    ports:
      - "9094:9094"   # cong cho app tren host ket noi vao
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # 3 listener: CONTROLLER (noi bo KRaft), INTERNAL (cho kafka-ui trong docker), EXTERNAL (cho app tren host)
      KAFKA_LISTENERS: CONTROLLER://:9093,INTERNAL://:9092,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://ecom-kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@ecom-kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ecom-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ecom
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ecom-kafka:9092
    depends_on:
      - kafka

volumes:
  pgdata:
