server:
  port: 8083

spring:
  application:
    name: order-service
  datasource:
    url: ${ORDER_DB_URL:jdbc:postgresql://localhost:5432/order_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_URL:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: >-
          orderCreated:com.project.orderservice.events.OrderCreatedEvent,
          orderCancelled:com.project.orderservice.events.OrderCancelledEvent

api:
  prefix: /api/v1

jwt:
  expiration: 2592000
  secretKey: ${JWT_SECRET}

services:
  user:
    url: ${USER_SERVICE_URL:http://localhost:8081}
  product:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8082}
